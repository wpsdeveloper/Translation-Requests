<body>
  <header>
    <div class="header-content">
      <div>
        <h1>Translation Requests</h1>
        <p class="subtitle" id="portal-subtitle">District data management portal</p>
      </div>
      <nav id="main-nav" style="display: none">
        <button id="nav-request" class="nav-btn">New Request</button>
        <button id="nav-dashboard" class="nav-btn active">Dashboard</button>
        <button id="nav-users" class="nav-btn">User Management</button>
      </nav>
    </div>
  </header>

  <div id="loading-view" class="view active" style="text-align: center; padding-top: 100px">
    <div class="spinner"></div>
    <p style="margin-top: 20px; color: #64748b; font-weight: 500">Loading application data...</p>
  </div>

  <div id="view-container"></div>

  <div id="toast-container" class="toast-container"></div>

  <dialog id="app-modal" class="modal">
    <div class="modal-content">
      <h2 id="modal-title"></h2>
      <p id="modal-body"></p>
      <div class="modal-actions">
        <button id="modal-close" class="btn-secondary">Close</button>
        <button id="modal-confirm" class="btn-primary" style="display: none;">Confirm</button>
      </div>
    </div>
  </dialog>

</body>
