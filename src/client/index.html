<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Translation Requests</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div>
      <h1>Translation Requests</h1>
      <p class="subtitle">Browse submitted requests, filter them by school, and inspect the request details without leaving the page.</p>
    </div>
    <div class="filters">
      <label for="school-filter">Filter by school</label>
      <div id="school-filter-wrapper">
      </div>
    </div>
  </header>

  <div class="panel">
    <section class="card">
      <div style="display:flex;align-items:baseline;justify-content:space-between;gap:16px;">
        <h2>Requests</h2>
        <span id="results-count" class="row-count">0 entries</span>
      </div>
      <div class="table-wrapper">
        <table aria-label="Requests table">
          <thead>
            <tr>
              <th>Status</th>
              <th>Request Date</th>
              <th>Submitted</th>
              <th>Type</th>
              <th>Requested By</th>
            </tr>
          </thead>
          <tbody id="requests-table-body"></tbody>
        </table>
      </div>
      <div id="empty-state" class="empty-state" hidden>No requests match the selected school.</div>
    </section>

    <section id="details-card" class="card">
      <h2 id="details-title">Request details</h2>
      <div id="details-card-body">
        <div>
          <div id="details-column-1">
            <div class="empty-state">Select a request row to view details here.</div>
          </div>
        </div>
        <div>
          <div id="column-2">
            <div class="empty-state"></div>
          </div>
        </div>
      </div>
    </section>
    <div>

    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
