<div class="panel-container">
  <button id="close-btn" class="close-icon" aria-label="Close panel">&times;</button>
  <header>
    <div class="detail-header-main">
      <div style="display: flex; align-items: center; gap: 8px">
        <h2>Request Details</h2>
        <button id="edit-btn" class="edit-icon-btn icon-btn" title="Edit request">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#000"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8.25 3H3a1.5 1.5 0 0 0 -1.5 1.5v10.5a1.5 1.5 0 0 0 1.5 1.5h10.5a1.5 1.5 0 0 0 1.5 -1.5v-5.25" />
            <path d="M13.875 1.875a1.591 1.591 0 0 1 2.25 2.25L9 11.25l-3 0.75 0.75 -3z" />
          </svg>
        </button>
      </div>
      <status-select id="detail-status"></status-select>
    </div>

    <div id="approval-info" class="shared-meta" style="display: none">
      <div class="detail-item">
        <label id="approved-by-label">Approved By</label>
        <span id="detail-approved-by"></span>
      </div>
      <div class="detail-item">
        <label id="approved-date-label">Approved Date</label>
        <span id="detail-approved-date"></span>
      </div>
      <hr />
    </div>
    <div class="shared-meta">
      <div class="detail-item">
        <label>Submitted</label>
        <span id="view-submitted" data-bind="submittedDate" data-format="date"></span>
      </div>
      <div class="detail-item">
        <label>Requester Name</label>
        <span id="view-requester-name" class="view-mode" data-bind="name"></span>
        <input type="text" id="edit-requester-name" class="form-control edit-mode" style="display: none"
          data-bind="name" />
      </div>

      <div class="detail-item">
        <label>School</label>
        <!-- View Mode -->
        <span id="view-school" class="view-mode" data-bind="school"></span>
        <!-- Edit Mode -->
        <div id="edit-school" class="edit-mode" style="display: none">
          <school-select id="detail-school"></school-select>
        </div>
      </div>

    </div>
</div>
</header>

<hr />
<div class="detail-item">
  <label>Type</label>
  <span id="view-reqType" data-bind="reqType"></span>
</div>
<div class="detail-item">
  <label class="view-mode">Languages</label>
  <span id="view-languages" class="view-mode"></span>
</div>
<div class="detail-item">
  <label class="edit-mode" style="display: none">Original Language</label>
  <input type="text" id="edit-orig-lang" class="form-control edit-mode" style="display: none"
    data-bind="originalLanguage" />
</div>

<div class="detail-item">
  <label class="edit-mode" style="display: none">Target Language</label>
  <input type="text" id="edit-target-lang" class="form-control edit-mode" style="display: none"
    data-bind="targetLanguage" />
</div>

<div class="detail-item">
  <label>Description</label>
  <div id="view-description" class="view-mode" data-bind="description"></div>
  <textarea id="edit-description" class="form-control edit-mode" style="display: none"
    data-bind="description"></textarea>
</div>

<div id="dynamic-content"></div>

<div class="detail-item">
  <footer>
    <button id="delete-btn" class="btn btn-danger" style="display: none">Delete</button>
    <button id="deny-btn" class="btn btn-danger" style="display: none">Deny</button>
    <button id="approve-btn" class="btn btn-success" style="display: none">Approve</button>
    <button id="cancel-btn" class="btn btn-secondary" style="display: none">Cancel</button>
    <button id="save-btn" class="btn btn-primary" style="display: none">Save Changes</button>
    <button id="process-btn" class="btn btn-primary" style="display: none">Process</button>
  </footer>
</div>
</div>
