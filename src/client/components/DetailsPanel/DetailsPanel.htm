<div class="panel-container">
  <header>
    <div class="header-main">
      <h2>Request Details</h2>
      <status-select id="detail-status"></status-select>
    </div>
    <div class="shared-meta">
      <p><strong>Type:</strong> <span id="detail-reqType"></span></p>
      <p><strong>Submitted:</strong> <span id="detail-submitted"></span></p>
      <p><strong>Requester:</strong> <span id="detail-requester"></span></p>
      <p><strong>Languages:</strong> <span id="detail-languages"></span></p>
      <p><strong>Description:</strong> <span id="detail-description"></span></p>
    </div>
  </header>

  <hr>

  <div id="dynamic-content"></div>

  <footer>
    <button id="close-btn">Close</button>
    <button id="edit-btn">Edit</button>
    <button id="save-btn" class="primary" style="display: none;">Save Changes</button>
    <button id="cancel-btn" style="display: none;">Cancel</button>
  </footer>
</div>
