<div class="interpretation-details">
  <div class="detail-item">
    <label>Interpretation Type: </label>
    <div class="view-mode" id="view-interpretation-type"></div>
    <input type="text" class="form-control edit-mode" id="edit-interpretation-type" style="display: none;" />
  </div>

  <div class="detail-item">
    <label>Event Date</label>
    <div class="view-mode" id="view-event-date"></div>
    <input type="date" class="form-control edit-mode" id="edit-event-date" style="display: none;" />
  </div>

  <div class="detail-item">
    <label>Event Time</label>
    <div class="view-mode" id="view-event-time"></div>
    <div class="edit-mode time-range" style="display: none;">
      <input type="time" class="form-control" id="edit-start-time" />
      <span>to</span>
      <input type="time" class="form-control" id="edit-end-time" />
    </div>
  </div>

  <div class="detail-item">
    <label>Event Location</label>
    <div class="view-mode" id="view-event-location"></div>
    <input type="text" class="form-control edit-mode" id="edit-event-location" style="display: none;" />
  </div>

  <hr />

  <contractor-select id="contractor-select"></contractor-select>

  <div class="detail-item">
    <label>Date Scheduled</label>
    <div class="view-mode" id="view-date-scheduled"></div>
    <input type="date" class="form-control edit-mode" id="edit-date-scheduled" style="display: none;" />
  </div>

  <div class="detail-item">
    <label>Date Guest Confirmed</label>
    <div class="view-mode" id="view-date-guest-confirmed"></div>
    <input type="date" class="form-control edit-mode" id="edit-date-guest-confirmed" style="display: none;" />
  </div>

  <div class="detail-item">
    <label>Date Tech Confirmed</label>
    <div class="view-mode" id="view-date-tech-confirmed"></div>
    <input type="date" class="form-control edit-mode" id="edit-date-tech-confirmed" style="display: none;" />
  </div>
</div>
