<div class="multi-select-container">
  <button id="dropdown-btn" class="dropdown-btn">
    <span id="selected-text">All Statuses</span>
    <span class="arrow">▼</span>
  </button>
  <div id="dropdown-menu" class="dropdown-menu">
    <div class="menu-toolbar">
      <button type="button" id="select-all-btn" class="toolbar-btn">Select All</button>
      <button type="button" id="clear-all-btn" class="toolbar-btn">Clear All</button>
    </div>
    <div class="menu-item">
      <input type="checkbox" id="status-needs-approval" value="Needs Approval" />
      <label for="status-needs-approval">Needs Approval</label>
    </div>
    <div class="menu-item">
      <input type="checkbox" id="status-approved" value="Approved" />
      <label for="status-approved">Approved</label>
    </div>
    <div class="menu-item">
      <input type="checkbox" id="status-scheduled" value="Scheduled" />
      <label for="status-scheduled">Scheduled</label>
    </div>
    <div class="menu-item">
      <input type="checkbox" id="status-out" value="Out for Translation" />
      <label for="status-out">Out for Translation</label>
    </div>
    <div class="menu-item">
      <input type="checkbox" id="status-sent" value="Sent for translation" />
      <label for="status-sent">Sent for translation</label>
    </div>
    <div class="menu-item">
      <input type="checkbox" id="status-Complete" value="Complete" />
      <label for="status-Complete">Complete</label>
    </div>
    <div class="menu-item">
      <input type="checkbox" id="status-denied" value="Denied" />
      <label for="status-denied">Denied</label>
    </div>
    <div class="menu-item">
      <input type="checkbox" id="status-canceled" value="Canceled" />
      <label for="status-canceled">Canceled</label>
    </div>
  </div>
</div>
