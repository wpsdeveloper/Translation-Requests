<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary: #d32f2f;
        --bg: #f8fafc;
        --card-bg: #ffffff;
        --text: #1e293b;
        --text-light: #64748b;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Outfit', sans-serif;
        background-color: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
      }

      .container {
        max-width: 450px;
        width: 90%;
        text-align: center;
        padding: 40px;
        background: var(--card-bg);
        border-radius: 24px;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .icon-wrapper {
        background: #fee2e2;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
      }

      .icon-wrapper svg {
        width: 40px;
        height: 40px;
        color: var(--primary);
      }

      h1 {
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 12px;
      }

      p {
        font-size: 16px;
        line-height: 1.6;
        color: var(--text-light);
        margin-bottom: 32px;
      }

      .footer {
        font-size: 14px;
        color: var(--text-light);
        border-top: 1px solid #e2e8f0;
        padding-top: 24px;
      }

      .domain-badge {
        display: inline-block;
        padding: 4px 12px;
        background: #f1f5f9;
        border-radius: 9999px;
        font-weight: 600;
        color: var(--text);
        margin: 8px 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
        </svg>
      </div>
      <h1>Access Denied</h1>
      <p>
        This application is restricted to authorized users only. Please sign in with your district email account:
        <br>
        <span class="domain-badge">@walpole.k12.ma.us</span>
      </p>
      <div class="footer">
        Walpole Public Schools
      </div>
    </div>
  </body>
</html>
